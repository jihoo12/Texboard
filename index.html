<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textarea with Connections & MathJax</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
</head>
<body>

    <div class="control-panel">
        <button class="btn create-btn" id="addTextareaBtn">+ Create New Textarea</button>
        <button class="btn line-btn" id="toggleLineBtn">🔗 Connect Mode: OFF</button>
    </div>

    <svg id="svg-canvas">
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 1 L 10 5 L 0 9 z" fill="#0078d4" />
            </marker>
        </defs>
    </svg>

    <div id="workspace">
        <div class="draggable-container" style="top: 30%; left: 20%;">
            <div class="drag-handle"></div>
            <div class="editor-wrapper">
                <textarea placeholder="Type TeX here (e.g., $E=mc^2$) and click outside..."></textarea>
                <div class="tex-preview"></div>
            </div>
        </div>
        <div class="draggable-container" style="top: 30%; left: 60%;">
            <div class="drag-handle"></div>
            <div class="editor-wrapper">
                <textarea placeholder="Type TeX here (e.g., $$\int_0^\infty x^2 dx$$)..."></textarea>
                <div class="tex-preview"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
